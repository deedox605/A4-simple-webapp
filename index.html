<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web App | DevOps Assignment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        
        .emoji {
            font-size: 4rem;
            margin: 20px 0;
        }
        
        p {
            color: #555;
            line-height: 1.6;
            margin: 15px 0;
        }
        
        .badge {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        
        button {
            background: #764ba2;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
            background: #667eea;
        }
        
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚀</div>
        <h1>Hello DevOps!</h1>
        <div class="badge">CI/CD Pipeline Active</div>
        <p>This web app is deployed automatically using:</p>
        <p>
            <strong>🐙 GitHub Actions</strong> + <strong>⚡ Render</strong>
        </p>
        <p>Every time I push code to GitHub, it automatically redeploys!</p>
        <button onclick="showMessage()">Click to Test 🎉</button>
        <p id="message" style="color: #764ba2; font-weight: bold;"></p>
        <div class="footer">
            📅 Deployed: <span id="date"></span><br>
            🔄 Auto-deployment enabled
        </div>
    </div>
    
    <script>
        function showMessage() {
            document.getElementById('message').innerHTML = '✅ GitHub Actions + Render is working perfectly!';
        }
        
        document.getElementById('date').innerHTML = new Date().toLocaleDateString();
    </script>
</body>
</html>
